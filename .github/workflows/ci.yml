name: CI

# Runs the AetherloomCore test suite on every push and pull request.
# A green check here means `swift test` passed for the package.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: AetherloomCore tests
    runs-on: macos-15
    defaults:
      run:
        working-directory: src/AetherloomCore

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select newest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            src/AetherloomCore/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('src/AetherloomCore/Package.swift', 'src/AetherloomCore/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run tests
        run: swift test
