name: CI

# Runs the AetherloomCore test suite on every push and pull request.
# A green check here means `swift test` passed for the package.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: AetherloomCore tests
    runs-on: macos-15
    defaults:
      run:
        working-directory: src/AetherloomCore

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # The package declares swift-tools-version 6.3, but the runner's stable
      # Xcode ships an older Swift. Select the newest stable Xcode anyway so a
      # current macOS SDK is available, then install Swift 6.3 via swiftly and
      # use that toolchain for the build.
      - name: Select newest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Cache swiftly itself (~/.swiftly: proxies + config) and the installed
      # toolchain (~/Library/Developer/Toolchains) so the ~1.4 GB Swift download
      # only happens on a cache miss. Runner paths are stable (user is always
      # "runner"), so the cached absolute paths remain valid across runs.
      - name: Cache Swift 6.3 toolchain
        id: swift-toolchain
        uses: actions/cache@v6
        with:
          path: |
            ~/.swiftly
            ~/Library/Developer/Toolchains
          key: swiftly-macos-15-6.3.2

      - name: Install Swift 6.3 toolchain via swiftly
        if: steps.swift-toolchain.outputs.cache-hit != 'true'
        working-directory: ${{ runner.temp }}
        run: |
          curl -fsSL -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          "$HOME/.swiftly/bin/swiftly" init --assume-yes --skip-install --quiet-shell-followup
          # shellcheck disable=SC1091
          . "$HOME/.swiftly/env.sh"
          swiftly install --use 6.3.2

      # Expose the swiftly toolchain to later steps on every run. The bin proxies
      # route to the 6.3.2 default recorded in the (possibly cached) config.
      - name: Put Swift 6.3 on PATH
        run: echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"

      - name: Show Swift version
        run: swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: |
            src/AetherloomCore/.build
          key: ${{ runner.os }}-spm-6.3.2-${{ hashFiles('src/AetherloomCore/Package.swift', 'src/AetherloomCore/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-6.3.2-

      - name: Run tests
        run: swift test
